<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Billi</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main>
      <header id="topbar">
        <h1 id="wordmark">Bil<em>li</em></h1>
        <p id="state">hold the orb or press and hold space to talk</p>
      </header>

      <div id="dash">
        <div id="left-col">
          <section id="stage">
            <canvas id="orb" width="340" height="340" aria-hidden="true"></canvas>
          </section>

          <section id="bookmarks" class="widget">
            <div class="widget-head">
              <h2 class="widget-title">Quick links</h2>
              <button id="add-link" type="button" title="Add a link">+ add</button>
            </div>
            <div id="link-grid"></div>
          </section>

          <section id="memory" class="widget">
            <div class="widget-head">
              <h2 class="widget-title">What Billi remembers</h2>
              <button id="add-memory" type="button" title="Add a memory">+ add</button>
            </div>
            <ul id="memory-list"></ul>
          </section>
        </div>

        <section id="panel">
          <div class="widget-head">
            <h2 id="panel-title">Conversation</h2>
            <button id="clear-convo" type="button" title="Clear the saved thread">clear</button>
          </div>
          <div id="conversation" aria-live="polite"></div>
        </section>
      </div>

      <div id="warn" hidden></div>
    </main>
    <script src="/bookmarks.js" type="module"></script>
    <script src="/memory.js" type="module"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
