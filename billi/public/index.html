<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Billi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600;1,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main id="app">
      <div id="warn" hidden></div>

      <!-- ===== HERO ===== -->
      <section id="hero">
        <!-- the orb (hold to talk) — the photographic sphere shows through; the
             glow blooms with your voice and is near-invisible at rest -->
        <div id="orb" role="button" tabindex="0" aria-label="Hold to talk">
          <div class="orb-glow"></div>
          <div class="orb-pulse"></div>
        </div>

        <!-- context pills -->
        <div class="hero-pills">
          <span id="weather" hidden>
            <span id="weather-icon" aria-hidden="true"></span>
            <span id="weather-temps"><span id="w-hi">–</span>°<span id="w-lo" hidden></span></span>
            <span class="sep">·</span>
            <span id="weather-place"></span>
          </span>
        </div>
      </section>

      <!-- ===== STATUS BAND ===== -->
      <section id="status-band">
        <div class="greet">
          <h1 id="greeting">Good Afternoon, Cara</h1>
          <p id="state">hold the orb or press and hold space to talk</p>
        </div>
        <div class="links-wrap">
          <div class="links-head">
            <span class="card-title">Quick links</span>
            <button id="add-link" type="button" title="Add a link">+ add</button>
          </div>
          <div id="link-grid"></div>
        </div>
      </section>

      <!-- ===== WORKSPACE ===== -->
      <section id="workspace">
        <section id="outbox" hidden>
          <div class="card-head">
            <h2 class="card-title">WhatsApp outbox · tap to send</h2>
          </div>
          <ul id="outbox-list"></ul>
        </section>

        <div id="grid">
          <section id="panel" class="card">
            <div class="card-head">
              <h2 id="panel-title" class="card-title">Conversation</h2>
              <button id="clear-convo" type="button" title="Clear the saved thread">clear</button>
            </div>
            <div id="conversation" aria-live="polite"></div>
          </section>

          <aside id="side">
            <section id="todos" class="card">
              <div class="card-head">
                <h2 class="card-title">To-do</h2>
                <button id="add-todo" type="button" title="Add a task">+ add</button>
              </div>
              <ul id="todo-list"></ul>
            </section>

            <section id="memory" class="card">
              <div class="card-head">
                <h2 class="card-title">What Billi remembers</h2>
                <button id="add-memory" type="button" title="Add a memory">+ add</button>
              </div>
              <ul id="memory-list"></ul>
            </section>
          </aside>
        </div>
      </section>
    </main>

    <script src="/bookmarks.js" type="module"></script>
    <script src="/todos.js" type="module"></script>
    <script src="/memory.js" type="module"></script>
    <script src="/weather.js" type="module"></script>
    <script src="/whatsapp.js" type="module"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
