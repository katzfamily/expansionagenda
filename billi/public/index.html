<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Billi</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main>
      <header id="topbar">
        <h1 id="wordmark">Bil<em>li</em></h1>
        <p id="state">hold the orb or press and hold space to talk</p>
      </header>

      <div id="dash">
        <section id="stage">
          <canvas id="orb" width="340" height="340" aria-hidden="true"></canvas>
        </section>

        <section id="panel">
          <h2 id="panel-title">Conversation</h2>
          <div id="conversation" aria-live="polite"></div>
        </section>
      </div>

      <div id="warn" hidden></div>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
