document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, #4a2f48, transparent 70%),\n    linear-gradient(160deg,#241a34,#1a1426 60%,#1e1830);\">\n\n  <!-- app card -->\n  <div style=\"position:relative; width:100%; max-width:1180px; border-radius:30px; overflow:hidden; box-shadow:0 50px 120px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.08); backdrop-filter:blur(2px);\">\n    <!-- shared background image -->\n    <div style=\"position:absolute; inset:0; z-index:0; background:url(&quot;83477068-9e24-4076-bbe6-361c1b4bf858&quot;) center 20% / cover;\"><\u002Fdiv>\n\n    <!-- ===== HERO ===== -->\n    <section style=\"position:relative; z-index:2; height:360px; overflow:visible; background:linear-gradient(180deg, rgba(120,104,170,0) 72%, rgba(108,92,158,0.22));\">\n\n      <!-- reflective orb -->\n      <div onpointerdown=\"{{ holdStart }}\" onpointerup=\"{{ holdEnd }}\" onpointerleave=\"{{ holdEnd }}\" style=\"position:absolute; z-index:5; left:calc(50% - 152px); top:118px; width:304px; height:304px; cursor:pointer; user-select:none; touch-action:none; animation:breathe 4.5s ease-in-out infinite;\">\n        <div style=\"{{ orbGlowStyle }}\"><\u002Fdiv>\n        <div style=\"position:absolute; inset:16px; border-radius:50%; background:{{ orbRays }}; opacity:0.28; animation:spin 22s linear infinite; mix-blend-mode:soft-light;\"><\u002Fdiv>\n        <div style=\"position:absolute; inset:0; border-radius:50%; overflow:hidden; box-shadow:inset 0 -26px 42px -12px rgba(255,255,255,0.92), inset 0 22px 36px -10px rgba(108,86,150,0.5), inset 18px 0 30px -14px rgba(255,255,255,0.45), inset -18px 0 30px -14px rgba(188,166,226,0.5), 0 32px 66px rgba(78,58,118,0.5), 0 0 0 1px rgba(255,255,255,0.55);\">\n          <div style=\"position:absolute; inset:-22%; background:url(&quot;83477068-9e24-4076-bbe6-361c1b4bf858&quot;) center 42% / 460px auto no-repeat; transform:scaleY(-1) scale(1.06); filter:saturate(1.18) brightness(1.06) contrast(1.02);\"><\u002Fdiv>\n          <div style=\"position:absolute; inset:0; background:{{ orbTint }}; mix-blend-mode:soft-light;\"><\u002Fdiv>\n          <div style=\"position:absolute; inset:0; background:linear-gradient(150deg, rgba(255,255,255,0.36) 0%, rgba(255,255,255,0) 40%);\"><\u002Fdiv>\n          <div style=\"position:absolute; left:64%; top:70%; width:26px; height:26px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.9), transparent 70%); filter:blur(1px);\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute; left:26%; top:17%; width:96px; height:62px; border-radius:50%; background:radial-gradient(circle at 40% 40%, rgba(255,255,255,0.95), rgba(255,255,255,0) 70%); filter:blur(2px);\"><\u002Fdiv>\n        <div style=\"{{ orbPulse }}\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- context pills (bottom-left) -->\n      <div style=\"position:absolute; left:24px; bottom:22px; display:flex; gap:10px;\">\n        <span style=\"display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border-radius:999px; font-size:13px; font-weight:600; color:#4f4768; background:rgba(255,255,255,0.28); border:1px solid rgba(255,255,255,0.5); backdrop-filter:blur(14px); box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);\">{{ weather.icon }} {{ weather.hi }}° · {{ weather.place }}<\u002Fspan>\n      <\u002Fdiv>\n\n    <\u002Fsection>\n\n    <!-- ===== STATUS BAND ===== -->\n    <section style=\"position:relative; z-index:1; padding:30px 36px 26px; background:linear-gradient(180deg, rgba(150,138,200,0.34), rgba(120,108,176,0.44)); backdrop-filter:blur(28px) saturate(150%); -webkit-backdrop-filter:blur(28px) saturate(150%); display:flex; align-items:flex-start; justify-content:space-between; gap:40px;\">\n      <div style=\"max-width:620px;\">\n        <h1 style=\"margin:0; font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:52px; line-height:1.0; color:#fbf7ff; letter-spacing:0.005em;\">{{ greeting }}<\u002Fh1>\n        <div style=\"display:flex; gap:16px; margin-top:20px; flex-wrap:wrap;\">\n          <sc-for list=\"{{ quickLinks }}\" as=\"q\" hint-placeholder-count=\"7\">\n            <a style=\"display:flex; flex-direction:column; align-items:center; gap:7px; text-decoration:none; cursor:pointer; transition:transform 0.18s;\" style-hover=\"transform:translateY(-3px)\">\n              <span style=\"width:48px; height:48px; border-radius:15px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:17px; background:{{ q.color }}; box-shadow:inset 0 1px 0 rgba(255,255,255,0.5), 0 8px 18px rgba(40,28,70,0.35);\">{{ q.initial }}<\u002Fspan>\n              <span style=\"font-size:11.5px; font-weight:500; color:rgba(255,255,255,0.85);\">{{ q.label }}<\u002Fspan>\n            <\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== CARDS ===== -->\n    <section style=\"position:relative; padding:24px 36px 32px; background:linear-gradient(180deg, rgba(108,92,158,0.72), rgba(92,78,140,0.82)); display:flex; gap:18px; align-items:stretch;\">\n      <div style=\"flex:1; display:grid; grid-template-columns:repeat(3,1fr); gap:16px;\">\n        <sc-for list=\"{{ cards }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <article style=\"border-radius:20px; overflow:hidden; background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.28); backdrop-filter:blur(16px); box-shadow:0 14px 34px rgba(40,28,70,0.3), inset 0 1px 0 rgba(255,255,255,0.4); cursor:pointer;\" style-hover=\"transform:translateY(-3px)\">\n            <div style=\"height:118px; position:relative; background:{{ c.art }};\">\n              <span style=\"position:absolute; left:12px; bottom:12px; padding:5px 13px; border-radius:999px; font-size:11.5px; font-weight:600; color:#4f4768; background:rgba(255,255,255,0.7); border:1px solid rgba(255,255,255,0.7); backdrop-filter:blur(8px);\">{{ c.tag }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:13px 15px 16px;\">\n              <h3 style=\"margin:0; font-size:15px; font-weight:600; color:#fff; line-height:1.3;\">{{ c.title }}<\u002Fh3>\n              <p style=\"margin:6px 0 0; font-size:12.5px; color:rgba(255,255,255,0.72); line-height:1.4;\">{{ c.sub }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <!-- vertical pagination -->\n      <div style=\"display:flex; flex-direction:column; align-items:center; gap:9px; justify-content:center;\">\n        <button style=\"width:38px; height:38px; border-radius:50%; border:1px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.12); color:#fff; font-size:13px; cursor:pointer;\">⌃<\u002Fbutton>\n        <sc-for list=\"{{ pages }}\" as=\"pg\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ pg.pick }}\" style=\"{{ pg.style }}\">{{ pg.n }}<\u002Fbutton>\n        <\u002Fsc-for>\n        <button style=\"width:38px; height:38px; border-radius:50%; border:1px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.12); color:#fff; font-size:13px; cursor:pointer;\">⌄<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:880}}\">\nclass Component extends DCLogic {\n  state = { phase:'idle', tempo:1, page:1 };\n\n  weather = { icon:'\\u2600\\ufe0f', hi:72, place:'Brooklyn' };\n  PERI = '125,123,240';\n  TERRA = '214,132,92';\n\n  phaseInfo = {\n    idle:      { label:'Resting',   note:'Hold the orb to talk', sum:\"I\\u2019m listening whenever you are. Hold the orb \\u2014 or press and hold Space \\u2014 and I\\u2019ll transcribe, think, and reply in your voice. Drafts and messages always wait for your sign-off.\" },\n    listening: { label:'Listening', note:'Listening\\u2026',        sum:\"Go ahead, I\\u2019m listening. Release when you\\u2019re done and I\\u2019ll take it from there.\" },\n    thinking:  { label:'Thinking',  note:'Thinking\\u2026',         sum:\"Working through that\\u2014pulling what I need and reasoning it out.\" },\n    speaking:  { label:'Speaking',  note:'Speaking\\u2026',         sum:\"Drafted your reply to Taylor and staged a WhatsApp nudge to Tori about the data heads-up. Both are waiting in your review queue \\u2014 I never send without sign-off.\" },\n  };\n  tempoOpts = [{ label:'Slow', v:0.7 }, { label:'Normal', v:1 }, { label:'Fast', v:1.2 }];\n\n  links = [\n    { initial:'G', label:'Gmail',     color:'linear-gradient(135deg,#ea5a5a,#d6456e)' },\n    { initial:'C', label:'Calendar',  color:'linear-gradient(135deg,#6f8ce8,#5e72c8)' },\n    { initial:'S', label:'Stripe',    color:'linear-gradient(135deg,#8a7bf0,#6f5ad6)' },\n    { initial:'S', label:'Slack',     color:'linear-gradient(135deg,#b07ad0,#9456b8)' },\n    { initial:'A', label:'Asana',     color:'linear-gradient(135deg,#f08aa0,#e0607c)' },\n    { initial:'A', label:'Airtable',  color:'linear-gradient(135deg,#5ab8c8,#3f9aac)' },\n    { initial:'F', label:'Fireflies', color:'linear-gradient(135deg,#e0a060,#c9822e)' },\n  ];\n\n  cardData = [\n    { tag:'To-do',  title:\"Review Tori\\u2019s data flag\", sub:'3 open \\u00b7 1 done today', art:'linear-gradient(140deg,#cfe0f2,#e6d2e8 55%,#f1d9c6)' },\n    { tag:'Memory', title:'Knows 12 things about you', sub:'Latest: Jam is Wed 2:45pm', art:'linear-gradient(140deg,#f3d8ce,#e6c4d6 55%,#d2c4ea)' },\n    { tag:'Drafts', title:'Reply to Taylor \\u2014 Thursday', sub:'Gmail draft \\u00b7 awaiting sign-off', art:'linear-gradient(140deg,#ccd8ee,#dcd0ec 55%,#f0d4c4)' },\n  ];\n\n  componentDidMount() {\n    this._kd = (e)=>{ if(e.code==='Space'&&!e.repeat){e.preventDefault();this.holdStart();} };\n    this._ku = (e)=>{ if(e.code==='Space'){e.preventDefault();this.holdEnd();} };\n    document.addEventListener('keydown',this._kd);\n    document.addEventListener('keyup',this._ku);\n  }\n  componentWillUnmount(){\n    document.removeEventListener('keydown',this._kd);\n    document.removeEventListener('keyup',this._ku);\n    clearTimeout(this._t1); clearTimeout(this._t2);\n  }\n\n  holdStart = () => {\n    if(this.state.phase==='speaking'||this.state.phase==='thinking') return;\n    this.setState({ phase:'listening' });\n  };\n  holdEnd = () => {\n    if(this.state.phase!=='listening') return;\n    this.setState({ phase:'thinking' });\n    this._t1 = setTimeout(()=>{\n      this.setState({ phase:'speaking' });\n      this._t2 = setTimeout(()=>this.setState({ phase:'idle' }), 2600);\n    }, 800);\n  };\n\n  renderVals() {\n    const phase = this.state.phase;\n    const c = phase==='speaking' ? this.TERRA : this.PERI;\n    const info = this.phaseInfo[phase];\n    const pulse = phase==='idle' ? 100 : phase==='speaking' ? 158 : 134;\n    const active = phase==='speaking' ? 6 : phase==='listening' ? 5 : phase==='thinking' ? 4 : 3;\n    const animate = phase==='listening' || phase==='speaking';\n\n    return {\n      weather: this.weather,\n      greeting: 'Good afternoon, Cara',\n      quickLinks: this.links,\n      summary: info.sum,\n      tempoNote: phase==='speaking' ? 'Keeping a calm, even tempo' : 'Voice tempo \\u00b7 ' + this.tempoOpts[[0.7,1,1.2].indexOf(this.state.tempo)].label,\n      holdStart: this.holdStart,\n      holdEnd: this.holdEnd,\n\n      orbGlowStyle:`position:absolute; inset:-22px; border-radius:50%; background:radial-gradient(circle, rgba(${c},0.42), rgba(${c},0) 70%); filter:blur(16px); transition:background 0.5s;`,\n      orbRays:`conic-gradient(from 0deg, rgba(${c},0.5), rgba(255,255,255,0.1) 14deg, rgba(${c},0.5) 28deg, rgba(255,255,255,0.1) 42deg, rgba(${c},0.5) 56deg, rgba(255,255,255,0.1) 70deg, rgba(${c},0.5) 84deg, rgba(255,255,255,0.1) 98deg, rgba(${c},0.5) 112deg)`,\n      orbFilter:`drop-shadow(0 22px 36px rgba(86,66,134,0.5)) drop-shadow(0 0 28px rgba(${c},0.5))`,\n      orbTint:`radial-gradient(circle at 42% 28%, rgba(255,255,255,0.4), rgba(${c},0.14) 54%, rgba(${c},0.04) 80%, transparent)`,\n      orbPulse:`position:absolute; left:50%; top:50%; width:${pulse}px; height:${pulse}px; transform:translate(-50%,-50%); border-radius:50%; background:radial-gradient(circle, rgba(${c},${phase==='speaking'?0.42:0.26}), rgba(${c},0) 68%); transition:all 0.6s ease; filter:blur(9px); mix-blend-mode:screen; pointer-events:none;`,\n\n      tempos: this.tempoOpts.map(t=>({\n        label:t.label,\n        pick:()=>this.setState({tempo:t.v}),\n        style:`border:none; border-radius:999px; padding:8px 17px; font:inherit; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; ${this.state.tempo===t.v ? 'color:#4a3f6e; background:rgba(255,255,255,0.85); box-shadow:0 4px 10px rgba(90,70,130,0.25);' : 'color:#5a5170; background:transparent;'}`,\n      })),\n\n      dashes: Array.from({length:9}, (_,i)=>({\n        style:`width:18px; height:4px; border-radius:999px; background:${i<active ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.3)'}; ${animate&&i<active ? `animation:dashpulse 1s ease-in-out ${i*0.12}s infinite;` : ''}`,\n      })),\n\n      cards: this.cardData,\n\n      pages: [1,2,3].map(n=>({\n        n,\n        pick:()=>this.setState({page:n}),\n        style:`width:38px; height:38px; border-radius:50%; font:inherit; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; ${this.state.page===n ? 'color:#4a3f6e; background:rgba(255,255,255,0.9); border:1px solid rgba(255,255,255,0.7);' : 'color:rgba(255,255,255,0.85); background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.25);'}`,\n      })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
